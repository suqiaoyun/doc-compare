<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>DocCompare Pro - 左右分栏预览</title>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsdiff/5.1.0/diff.min.js"></script>

    <style>
        :root {
            --google-blue: #1a73e8;
            --border: #dadce0;
        }
        body { font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        
        /* 头部 */
        header { padding: 10px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: #fff; }
        
        /* 操作区 */
        .controls { padding: 10px 20px; display: flex; gap: 10px; border-bottom: 1px solid var(--border); }
        .upload-box { border: 1px dashed #ccc; padding: 5px 15px; border-radius: 4px; font-size: 12px; cursor: pointer; }
        
        /* 左右分栏核心布局 */
        .main-container { display: flex; flex: 1; overflow: hidden; background: #f1f3f4; }
        
        .pane { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            background: #fff; 
            margin: 10px; 
            border-radius: 8px; 
            border: 1px solid var(--border);
            overflow: hidden;
        }
        
        .pane-header { padding: 8px 15px; background: #f8f9fa; border-bottom: 1px solid var(--border); font-weight: bold; font-size: 14px; }
        
        /* 预览内容区 */
        .content-area { 
            flex: 1; 
            overflow-y: scroll; 
            padding: 20px; 
            line-height: 1.8; 
            font-size: 14px;
            white-space: pre-wrap; /* 保持文档格式 */
        }

        /* 差异样式 */
        .added { background: #e6ffec; text-decoration: none; border-bottom: 2px solid #2da44e; }
        .removed { background: #ffebe9; text-decoration: line-through; color: #cf222e; }
        .placeholder { color: transparent; user-select: none; }

        button { background: var(--google-blue); color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <div style="font-size:18px;"><b>DocCompare</b> <small>预览版</small></div>
</header>

<div class="controls">
    <div class="upload-box" onclick="document.getElementById('f1').click()">📁 上传文件 A <input type="file" id="f1" hidden></div>
    <div class="upload-box" onclick="document.getElementById('f2').click()">📁 上传文件 B <input type="file" id="f2" hidden></div>
    <button onclick="compare()">开始对比分析</button>
</div>

<div class="main-container">
    <div class="pane">
        <div class="pane-header" id="name1">文件 A 预览</div>
        <div class="content-area" id="view1"></div>
    </div>
    <div class="pane">
        <div class="pane-header" id="name2">文件 B 预览</div>
        <div class="content-area" id="view2"></div>
    </div>
</div>

<script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

    let store = { a: "", b: "" };

    // 文件读取
    document.getElementById('f1').onchange = (e) => handle(e.target.files[0], 'a', 'name1');
    document.getElementById('f2').onchange = (e) => handle(e.target.files[0], 'b', 'name2');

    async function handle(file, key, nameId) {
        if (!file) return;
        document.getElementById(nameId).innerText = file.name;
        const ext = file.name.split('.').pop().toLowerCase();
        
        if (ext === 'docx') {
            const res = await mammoth.convertToHtml({arrayBuffer: await file.arrayBuffer()});
            store[key] = res.value; // Word保留部分HTML结构
        } else if (ext === 'pdf') {
            const pdf = await pdfjsLib.getDocument(await file.arrayBuffer()).promise;
            let text = "";
            for(let i=1; i<=pdf.numPages; i++){
                const page = await pdf.getPage(i);
                const content = await page.getTextContent();
                text += content.items.map(s => s.str).join(" ") + "\n";
            }
            store[key] = text;
        } else if (ext.includes('xls')) {
            const wb = XLSX.read(await file.arrayBuffer());
            store[key] = XLSX.utils.sheet_to_html(wb.Sheets[wb.SheetNames[0]]);
        }
        document.getElementById('view' + (key === 'a' ? '1' : '2')).innerHTML = store[key];
    }

    function compare() {
        if (!store.a || !store.b) return alert("请先上传两个文件");
        
        // 使用 jsdiff 逐行对比
        const diff = Diff.diffLines(store.a, store.b);
        const view1 = document.getElementById('view1');
        const view2 = document.getElementById('view2');
        
        view1.innerHTML = '';
        view2.innerHTML = '';

        diff.forEach(part => {
            const span = document.createElement('span');
            if (part.added) {
                span.className = 'added';
                span.innerHTML = part.value;
                view2.appendChild(span);
                // 左侧插入等高的空白占位符
                const placeholder = document.createElement('span');
                placeholder.className = 'placeholder';
                placeholder.innerHTML = part.value;
                view1.appendChild(placeholder);
            } else if (part.removed) {
                span.className = 'removed';
                span.innerHTML = part.value;
                view1.appendChild(span);
                // 右侧插入等高的空白占位符
                const placeholder = document.createElement('span');
                placeholder.className = 'placeholder';
                placeholder.innerHTML = part.value;
                view2.appendChild(placeholder);
            } else {
                span.innerHTML = part.value;
                view1.appendChild(span.cloneNode(true));
                view2.appendChild(span);
            }
        });

        // 绑定同步滚动
        view1.onscroll = () => view2.scrollTop = view1.scrollTop;
        view2.onscroll = () => view1.scrollTop = view2.scrollTop;
    }
</script>
</body>
</html>
