<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DocCompare - 极简文档对比</title>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsdiff/5.1.0/diff.min.js"></script>
    
    <style>
        :root {
            --google-blue: #1a73e8;
            --google-gray: #f8f9fa;
            --text-dark: #3c4043;
            --added-bg: #e6ffec;
            --removed-bg: #ffebe9;
        }

        body {
            font-family: 'Roboto', Arial, sans-serif;
            margin: 0;
            color: var(--text-dark);
            background-color: #ffffff;
        }

        /* 顶部导航 */
        header {
            padding: 18px 24px;
            border-bottom: 1px solid #dadce0;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo { font-size: 22px; color: #5f6368; }

        /* 主容器 */
        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        /* 上传区域布局 */
        .upload-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .drop-zone {
            border: 2px dashed #dadce0;
            border-radius: 8px;
            padding: 40px;
            text-align: center;
            transition: 0.3s;
            background: var(--google-gray);
            cursor: pointer;
        }

        .drop-zone:hover { border-color: var(--google-blue); }

        /* 模式切换按钮 */
        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            justify-content: center;
        }

        button {
            padding: 10px 24px;
            border-radius: 4px;
            border: 1px solid #dadce0;
            background: white;
            cursor: pointer;
            font-weight: 500;
        }

        button.active {
            background: var(--google-blue);
            color: white;
            border-color: var(--google-blue);
        }

        /* 结果显示区 */
        #result {
            white-space: pre-wrap;
            padding: 20px;
            border: 1px solid #dadce0;
            border-radius: 8px;
            line-height: 1.6;
        }

        .added { background-color: var(--added-bg); text-decoration: none; }
        .removed { background-color: var(--removed-bg); text-decoration: line-through; }
    </style>
</head>
<body>

<header>
    <div class="logo">Doc<b>Compare</b></div>
</header>

<div class="container">
    <div class="controls">
        <button id="modeText" class="active">文本差异 (Git模式)</button>
        <button id="modeData">数据差异 (仅Excel)</button>
    </div>

    <div class="upload-section">
        <div class="drop-zone" id="file1Zone">文件 A (点击或拖入)
            <input type="file" id="file1" hidden>
        </div>
        <div class="drop-zone" id="file2Zone">文件 B (点击或拖入)
            <input type="file" id="file2" hidden>
        </div>
    </div>

    <button id="compareBtn" style="width:100%; background: var(--google-blue); color:white;">开始对比</button>

    <div id="result" style="margin-top: 30px;">
        对比结果将在这里显示...
    </div>
</div>

<script>
    // 基础状态管理
    let file1Data = null;
    let file2Data = null;
    let compareMode = 'text'; // 'text' 或 'data'

    // 绑定事件
    document.getElementById('file1Zone').onclick = () => document.getElementById('file1').click();
    document.getElementById('file2Zone').onclick = () => document.getElementById('file2').click();

    document.getElementById('file1').onchange = (e) => handleFile(e, 1);
    document.getElementById('file2').onchange = (e) => handleFile(e, 2);

    document.getElementById('modeText').onclick = function() {
        this.classList.add('active');
        document.getElementById('modeData').classList.remove('active');
        compareMode = 'text';
    };

    document.getElementById('modeData').onclick = function() {
        this.classList.add('active');
        document.getElementById('modeText').classList.remove('active');
        compareMode = 'data';
    };

    // 文件处理逻辑 (以 Excel 为例)
    function handleFile(e, fileNum) {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = (evt) => {
            const bstr = evt.target.result;
            const wb = XLSX.read(bstr, {type: 'binary'});
            // 获取第一个工作表的内容
            const wsname = wb.SheetNames[0];
            const ws = wb.Sheets[wsname];
            
            if (fileNum === 1) file1Data = ws;
            else file2Data = ws;
            
            alert(`文件 ${fileNum} 加载成功`);
        };
        reader.readAsBinaryString(file);
    }

    document.getElementById('compareBtn').onclick = () => {
        if (!file1Data || !file2Data) return alert('请先上传两个文件');
        
        if (compareMode === 'text') {
            compareAsText();
        } else {
            compareAsData();
        }
    };

    function compareAsText() {
        const text1 = XLSX.utils.sheet_to_txt(file1Data);
        const text2 = XLSX.utils.sheet_to_txt(file2Data);
        
        const diff = Diff.diffLines(text1, text2);
        const display = document.getElementById('result');
        display.innerHTML = '';

        diff.forEach((part) => {
            const span = document.createElement('span');
            span.className = part.added ? 'added' : part.removed ? 'removed' : '';
            span.appendChild(document.createTextNode(part.value));
            display.appendChild(span);
        });
    }

    function compareAsData() {
        const json1 = XLSX.utils.sheet_to_json(file1Data, {header: 1});
        const json2 = XLSX.utils.sheet_to_json(file2Data, {header: 1});
        
        let report = "数据差异报告：\n";
        json1.forEach((row, i) => {
            row.forEach((cell, j) => {
                if (json2[i] && json2[i][j] !== cell) {
                    report += `单元格 [行${i+1}, 列${j+1}]: '${cell}' -> '${json2[i][j]}'\n`;
                }
            });
        });
        document.getElementById('result').innerText = report;
    }
</script>

</body>
</html>
