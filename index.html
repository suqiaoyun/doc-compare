<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Excel 网页可视化核对助手</title>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <style>
        :root { --primary: #1a73e8; --diff-bg: #fff0f0; --diff-text: #d93025; }
        body { font-family: system-ui; background: #f8f9fa; margin: 0; padding: 20px; }
        
        .header { text-align: center; margin-bottom: 15px; }
        .header h1 { color: var(--primary); font-size: 24px; margin: 0; }

        /* 上传区域高度压缩 */
        .upload-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        .drop-card { 
            background: #fff; border: 2px dashed #dadce0; border-radius: 8px; 
            height: 60px; display: flex; flex-direction: column; justify-content: center; align-items: center;
            cursor: pointer; transition: 0.2s;
        }
        .drop-card:hover { border-color: var(--primary); background: #f1f8ff; }
        .file-info { font-size: 12px; color: var(--primary); font-weight: bold; margin-top: 2px; }

        .btn-run { 
            width: 100%; height: 45px; background: var(--primary); color: white; border: none; 
            border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; margin-bottom: 15px;
        }

        /* 渲染表格样式 */
        .main-view { display: grid; grid-template-columns: 1fr 1fr; gap: 0; border: 1px solid #ddd; background: #fff; border-radius: 8px; overflow: hidden; }
        .pane { height: 700px; overflow: auto; position: relative; }
        .pane:first-child { border-right: 2px solid var(--primary); }
        
        table { border-collapse: collapse; width: 100%; font-size: 13px; table-layout: fixed; }
        th, td { border: 1px solid #e0e0e0; padding: 8px; text-align: left; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 100px; height: 25px; }
        th { background: #f1f3f4; position: sticky; top: 0; z-index: 10; }

        /* 差异标红样式 */
        .cell-diff { background-color: var(--diff-bg) !important; color: var(--diff-text) !important; font-weight: bold; border: 1px solid var(--diff-text) !important; }
        .label { position: sticky; top: 0; left: 0; background: var(--primary); color: white; padding: 4px 10px; font-size: 12px; z-index: 20; }
    </style>
</head>
<body>

<div class="header">
    <h1>Excel 原生样式核对助手</h1>
</div>

<div class="upload-row">
    <div class="drop-card" onclick="document.getElementById('fileA').click()">
        <input type="file" id="fileA" hidden accept=".xlsx,.xls">
        <h3>📄 点击上传原件 Excel</h3>
        <div id="infoA" class="file-info">未选择</div>
    </div>
    <div class="drop-card" onclick="document.getElementById('fileB').click()">
        <input type="file" id="fileB" hidden accept=".xlsx,.xls">
        <h3>📄 点击上传新版 Excel</h3>
        <div id="infoB" class="file-info">未选择</div>
    </div>
</div>

<button class="btn-run" id="btnRun">执行单元格级比对</button>

<div class="main-view">
    <div class="pane" id="paneA"><div class="label">原件视图</div><div id="outA"></div></div>
    <div class="pane" id="paneB"><div class="label">修订视图</div><div id="outB"></div></div>
</div>

<script>
    let sheets = { A: [], B: [] };

    async function handleExcel(file, key) {
        if (!file) return;
        document.getElementById('info' + key).innerText = "正在解析: " + file.name;
        const ab = await file.arrayBuffer();
        const wb = XLSX.read(new Uint8Array(ab), { type: 'array' });
        // 只取第一个工作表进行比对
        const ws = wb.Sheets[wb.SheetNames[0]];
        // 转化为二维数组以便坐标比对 {header: 1}
        sheets[key] = XLSX.utils.sheet_to_json(ws, { header: 1, defval: "" });
        document.getElementById('info' + key).innerText = "已就绪: " + file.name;
    }

    document.getElementById('fileA').onchange = (e) => handleExcel(e.target.files[0], 'A');
    document.getElementById('fileB').onchange = (e) => handleExcel(e.target.files[0], 'B');

    document.getElementById('btnRun').onclick = () => {
        if (sheets.A.length === 0 || sheets.B.length === 0) return alert("请先上传两个 Excel 文件");

        const maxRows = Math.max(sheets.A.length, sheets.B.length);
        const maxCols = Math.max(
            sheets.A.reduce((max, row) => Math.max(max, row.length), 0),
            sheets.B.reduce((max, row) => Math.max(max, row.length), 0)
        );

        renderTable('outA', sheets.A, sheets.B, maxRows, maxCols);
        renderTable('outB', sheets.B, sheets.A, maxRows, maxCols);

        // 同步滚动逻辑
        const pA = document.getElementById('paneA');
        const pB = document.getElementById('paneB');
        pA.onscroll = () => { pB.scrollTop = pA.scrollTop; pB.scrollLeft = pA.scrollLeft; };
        pB.onscroll = () => { pA.scrollTop = pB.scrollTop; pA.scrollLeft = pB.scrollLeft; };
    };

    function renderTable(targetId, currentData, compareData, rows, cols) {
        let html = '<table>';
        // 生成表头
        html += '<tr><th>#</th>';
        for (let j = 0; j < cols; j++) {
            html += `<th>${String.fromCharCode(65 + j)}</th>`;
        }
        html += '</tr>';

        // 生成内容
        for (let i = 0; i < rows; i++) {
            html += `<tr><th>${i + 1}</th>`;
            for (let j = 0; j < cols; j++) {
                const val = (currentData[i] && currentData[i][j] !== undefined) ? currentData[i][j] : "";
                const otherVal = (compareData[i] && compareData[i][j] !== undefined) ? compareData[i][j] : "";
                
                // 核心比对：如果值不同，标记 class
                const isDiff = String(val).trim() !== String(otherVal).trim();
                const diffClass = isDiff ? 'class="cell-diff"' : '';
                
                html += `<td ${diffClass} title="对比值: ${otherVal}">${val}</td>`;
            }
            html += '</tr>';
        }
        html += '</table>';
        document.getElementById(targetId).innerHTML = html;
    }
</script>
</body>
</html>
