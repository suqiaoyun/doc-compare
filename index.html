<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>文字智能核对助手</title>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsdiff/5.1.0/diff.min.js"></script>

    <style>
        :root { --primary: #1a73e8; --bg: #f8f9fa; --diff-add: #e6ffec; --diff-remove: #ffebe9; }
        body { font-family: 'PingFang SC', sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .header { text-align: center; margin-bottom: 20px; }
        .header h1 { color: var(--primary); font-size: 26px; margin: 0; }
        
        /* 上传框高度极致压缩 */
        .upload-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        .drop-card { 
            background: #fff; border: 2px dashed #dadce0; border-radius: 8px; 
            height: 60px; display: flex; flex-direction: column; justify-content: center; align-items: center;
            cursor: pointer; transition: 0.2s;
        }
        .drop-card:hover { border-color: var(--primary); background: #f1f8ff; }
        .drop-card h3 { font-size: 13px; margin: 0; color: #5f6368; }
        .file-info { font-size: 11px; color: var(--primary); font-weight: bold; margin-top: 2px; }

        .btn-run { 
            width: 100%; height: 45px; background: var(--primary); color: white; border: none; 
            border-radius: 6px; font-size: 15px; font-weight: bold; cursor: pointer; margin-bottom: 15px;
        }

        /* 预览框拉长至 750px */
        .main-view { background: #fff; border-radius: 8px; display: grid; grid-template-columns: 1fr 1fr; border: 1px solid #dadce0; overflow: hidden; }
        .label { padding: 10px; background: #f1f3f4; font-size: 12px; font-weight: bold; border-bottom: 1px solid #dadce0; }
        .viewer { height: 750px; overflow-y: auto; padding: 20px; font-size: 13px; line-height: 2; white-space: pre-wrap; word-break: break-all; }
        .viewer:first-of-type { border-right: 1px solid #dadce0; }

        .added { background: var(--diff-add); color: #137333; }
        .removed { background: var(--diff-remove); color: #d93025; text-decoration: line-through; }
        .tag { display: block; background: #e8f0fe; color: #1a73e8; padding: 4px; font-weight: bold; margin: 10px 0; border-left: 4px solid var(--primary); }
    </style>
</head>
<body>

<div class="header"><h1>文字智能核对助手</h1></div>

<div class="container" style="max-width: 1400px; margin: 0 auto;">
    <div class="upload-row">
        <div class="drop-card" onclick="document.getElementById('fileA').click()">
            <input type="file" id="fileA" hidden accept=".pdf,.docx,.xlsx">
            <h3>📁 点击上传原件</h3>
            <div id="infoA" class="file-info">未选择</div>
        </div>
        <div class="drop-card" onclick="document.getElementById('fileB').click()">
            <input type="file" id="fileB" hidden accept=".pdf,.docx,.xlsx">
            <h3>📁 点击上传新版</h3>
            <div id="infoB" class="file-info">未选择</div>
        </div>
    </div>

    <button class="btn-run" id="btnRun">开始智能核对分析</button>

    <div class="main-view">
        <div class="label">【原件内容】</div><div class="label">【对比修订】</div>
        <div id="v1" class="viewer"></div><div id="v2" class="viewer"></div>
    </div>
</div>

<script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
    let fileContents = { A: "", B: "" };

    // 文件处理函数
    async function processFile(file, key) {
        if (!file) return;
        document.getElementById('info' + key).innerText = "加载中: " + file.name;
        const ext = file.name.split('.').pop().toLowerCase();
        let text = "";

        try {
            if (ext === 'xlsx' || ext === 'xls') {
                const ab = await file.arrayBuffer();
                // 深度修复点：强制指定二进制 array 读取，并转为 JSON 格式避免乱码
                const wb = XLSX.read(new Uint8Array(ab), { type: 'array' });
                wb.SheetNames.forEach(sheetName => {
                    const ws = wb.Sheets[sheetName];
                    const rows = XLSX.utils.sheet_to_json(ws, { header: 1 });
                    text += `\n[表格: ${sheetName}]\n`;
                    rows.forEach(row => {
                        text += row.map(cell => (cell === null || cell === undefined) ? "" : cell).join(" | ") + "\n";
                    });
                });
            } else if (ext === 'pdf') {
                const pdf = await pdfjsLib.getDocument(await file.arrayBuffer()).promise;
                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const content = await page.getTextContent();
                    text += `\n[第 ${i} 页]\n` + content.items.map(s => s.str).join(" ") + "\n";
                }
            } else if (ext === 'docx') {
                const res = await mammoth.extractRawText({ arrayBuffer: await file.arrayBuffer() });
                text = res.value;
            }
            fileContents[key] = text;
            document.getElementById('info' + key).innerText = "已就绪: " + file.name;
        } catch (e) {
            alert("文件读取失败，请检查文件是否加密或损坏。");
        }
    }

    document.getElementById('fileA').onchange = (e) => processFile(e.target.files[0], 'A');
    document.getElementById('fileB').onchange = (e) => processFile(e.target.files[0], 'B');

    document.getElementById('btnRun').onclick = () => {
        if (!fileContents.A || !fileContents.B) return alert("请先上传两份文件");
        
        const v1 = document.getElementById('v1');
        const v2 = document.getElementById('v2');
        v1.innerHTML = ''; v2.innerHTML = '';

        const diffs = Diff.diffLines(fileContents.A, fileContents.B);

        diffs.forEach(part => {
            const cleanText = part.value.replace(/\[(第 \d+ 页|表格: .*?)\]/g, '<span class="tag">$1</span>');
            const lines = (part.value.match(/\n/g) || []).length;

            if (part.added) {
                v2.appendChild(createSpan(cleanText, 'added'));
                v1.appendChild(createSpan('\n'.repeat(lines + 1), ''));
            } else if (part.removed) {
                v1.appendChild(createSpan(cleanText, 'removed'));
                v2.appendChild(createSpan('\n'.repeat(lines + 1), ''));
            } else {
                v1.appendChild(createSpan(cleanText, ''));
                v2.appendChild(createSpan(cleanText, ''));
            }
        });

        v1.onscroll = () => v2.scrollTop = v1.scrollTop;
        v2.onscroll = () => v1.scrollTop = v2.scrollTop;
    };

    function createSpan(html, cls) {
        const s = document.createElement('span');
        if (cls) s.className = cls;
        s.innerHTML = html;
        return s;
    }
</script>
</body>
</html>
