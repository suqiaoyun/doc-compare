<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>文档对比助手 - MatchDiff</title>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsdiff/5.1.0/diff.min.js"></script>

    <style>
        :root { --primary: #1a73e8; --bg: #f8f9fa; --diff-red: #fff0f0; --diff-border: #d93025; }
        body { font-family: 'Segoe UI', 'PingFang SC', sans-serif; background: var(--bg); margin: 0; padding: 10px; height: 100vh; display: flex; flex-direction: column; box-sizing: border-box; overflow: hidden; }
        
        /* 1. 压缩头部空白 */
        .app-header { margin-bottom: 10px; text-align: center; }
        .app-header h1 { font-size: 24px; color: var(--primary); margin: 0; font-weight: 700; }
        .app-header p { font-size: 13px; color: #70757a; margin: 2px 0; font-weight: 500; }

        .top-nav { 
            display: grid; grid-template-columns: 1fr 120px 1fr; gap: 10px; 
            background: #fff; padding: 10px; border-radius: 8px; 
            box-shadow: 0 1px 5px rgba(0,0,0,0.05); align-items: center; margin-bottom: 10px;
        }
        
        .upload-section { display: flex; flex-direction: column; gap: 5px; }
        .upload-zone { border: 2px dashed #dadce0; border-radius: 8px; height: 50px; display: flex; align-items: center; justify-content: center; cursor: pointer; background: #fff; }
        .upload-zone span { font-size: 15px; color: var(--primary); font-weight: 900; }
        .sheet-selector { display: none; padding: 4px; border: 1px solid var(--primary); border-radius: 4px; font-size: 12px; font-weight: bold; }

        .btn-go { background: var(--primary); color: white; border: none; height: 40px; border-radius: 6px; font-weight: bold; cursor: pointer; }

        /* 布局容器 */
        .content-container { display: flex; flex: 1; gap: 10px; overflow: hidden; }
        
        .main-view { display: grid; grid-template-columns: 1fr 1fr; gap: 2px; flex: 1; background: #dee2e6; border-radius: 8px; overflow: hidden; }
        .pane { background: #fff; overflow: auto; scroll-behavior: smooth; }
        
        /* 2. 差异清单侧边栏 */
        .diff-sidebar { 
            width: 260px; background: #fff; border-radius: 8px; display: flex; flex-direction: column; 
            box-shadow: -2px 0 10px rgba(0,0,0,0.05); transition: width 0.3s; position: relative;
        }
        .diff-sidebar.hidden { width: 40px; }
        .sidebar-header { 
            padding: 12px; background: #f1f3f4; border-radius: 8px 8px 0 0; 
            display: flex; justify-content: space-between; align-items: center; font-weight: bold; font-size: 14px;
        }
        .sidebar-content { flex: 1; overflow-y: auto; padding: 10px; }
        .diff-item { 
            padding: 8px; border-radius: 4px; border-left: 4px solid var(--diff-border); 
            background: var(--diff-red); margin-bottom: 8px; font-size: 12px; cursor: pointer;
            transition: 0.2s;
        }
        .diff-item:hover { filter: brightness(0.95); }
        .toggle-btn { cursor: pointer; padding: 5px; background: var(--primary); color: #fff; border-radius: 4px; font-size: 10px; text-align: center; }

        /* 内容样式 */
        .excel-table { border-collapse: collapse; table-layout: fixed; width: max-content; }
        .excel-table td, .excel-table th { border: 1px solid #ebebeb; padding: 8px; height: 32px; font-size: 13px; }
        .diff-cell { background: var(--diff-red) !important; color: var(--diff-border) !important; font-weight: bold; outline: 1.5px solid var(--diff-border); }
        
        .text-mode { padding: 30px; line-height: 2.2; font-size: 14px; white-space: pre-wrap; }
        .page-divider { display: flex; align-items: center; margin: 20px 0 10px 0; color: var(--primary); font-size: 12px; font-weight: bold; }
        .page-badge { background: #e8f0fe; padding: 2px 10px; border-radius: 10px; margin: 0 10px; }
        .txt-added { background: #e6ffec; color: #137333; }
        .txt-removed { background: #ffebe9; color: #d93025; text-decoration: line-through; }
    </style>
</head>
<body>

<div class="app-header">
    <h1>文档对比助手</h1>
    <p>支持 pdf / word / excel 文件</p>
</div>

<div class="top-nav">
    <div class="upload-section">
        <div class="upload-zone" id="zoneA"><span>📂 点击或拖入原件</span></div>
        <input type="file" id="fileA" hidden accept=".pdf,.docx,.xlsx,.xls,.txt">
        <select id="sheetA" class="sheet-selector"></select>
    </div>
    <button class="btn-go" id="runBtn">执行核对</button>
    <div class="upload-section">
        <div class="upload-zone" id="zoneB"><span>📂 点击或拖入修订件</span></div>
        <input type="file" id="fileB" hidden accept=".pdf,.docx,.xlsx,.xls,.txt">
        <select id="sheetB" class="sheet-selector"></select>
    </div>
</div>

<div class="content-container">
    <div class="main-view">
        <div class="pane" id="p1"></div>
        <div class="pane" id="p2"></div>
    </div>

    <div class="diff-sidebar" id="sidebar">
        <div class="sidebar-header">
            <span id="diffCount">差异清单 (0)</span>
            <div class="toggle-btn" onclick="document.getElementById('sidebar').classList.toggle('hidden')">收起/展开</div>
        </div>
        <div class="sidebar-content" id="diffList">
            <p style="color:#999; font-size:12px; text-align:center;">核对后自动显示差异</p>
        </div>
    </div>
</div>

<script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
    let dataA = { ext: '', wb: null, val: null }, dataB = { ext: '', wb: null, val: null };

    // 初始化上传
    ['A', 'B'].forEach(key => {
        const zone = document.getElementById('zone'+key);
        const input = document.getElementById('file'+key);
        zone.onclick = () => input.click();
        input.onchange = (e) => handleParse(e.target.files[0], key);
        zone.ondragover = (e) => e.preventDefault();
        zone.ondrop = (e) => { e.preventDefault(); handleParse(e.dataTransfer.files[0], key); };
    });

    async function handleParse(file, key) {
        if(!file) return;
        const obj = (key === 'A') ? dataA : dataB;
        const ext = file.name.split('.').pop().toLowerCase();
        obj.ext = ext;
        const sel = document.getElementById('sheet'+key);
        sel.style.display = 'none'; sel.innerHTML = '';

        if (ext.includes('xls')) {
            const wb = XLSX.read(await file.arrayBuffer(), {type: 'array'});
            obj.wb = wb;
            wb.SheetNames.forEach(n => { const o = document.createElement('option'); o.value=n; o.innerText="工作表: "+n; sel.appendChild(o); });
            sel.style.display = 'block';
            obj.val = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {header: 1, defval: ""});
        } else if (ext === 'pdf') {
            const pdf = await pdfjsLib.getDocument(await file.arrayBuffer()).promise;
            let t = "";
            for (let i=1; i<=pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const content = await page.getTextContent();
                t += `[[PAGE_${i}]]\n` + content.items.map(s => s.str).join(" ") + "\n";
            }
            obj.val = t;
        } else if (ext === 'docx') {
            obj.val = (await mammoth.extractRawText({ arrayBuffer: await file.arrayBuffer() })).value;
        } else { obj.val = await file.text(); }
        document.getElementById('zone'+key).querySelector('span').innerText = "✅ " + file.name;
    }

    document.getElementById('runBtn').onclick = () => {
        const v1 = document.getElementById('p1'), v2 = document.getElementById('p2');
        if (!dataA.val || !dataB.val) return;
        
        const list = document.getElementById('diffList');
        list.innerHTML = "";
        let diffItems = [];

        if (dataA.ext.includes('xls')) {
            renderExcel(v1, v2, diffItems);
        } else {
            renderText(v1, v2, diffItems);
        }

        // 更新差异侧边栏
        document.getElementById('diffCount').innerText = `差异清单 (${diffItems.length})`;
        diffItems.forEach((item, idx) => {
            const div = document.createElement('div');
            div.className = 'diff-item';
            div.innerHTML = `<strong>#${idx+1}</strong>: ${item.txt}`;
            div.onclick = () => {
                const target = document.getElementById(item.id);
                target.scrollIntoView({ behavior: 'smooth', block: 'center' });
                target.style.outline = "3px solid #ff0";
                setTimeout(() => target.style.outline = "", 2000);
            };
            list.appendChild(div);
        });

        v1.onscroll = () => { v2.scrollTop = v1.scrollTop; v2.scrollLeft = v1.scrollLeft; };
        v2.onscroll = () => { v1.scrollTop = v2.scrollTop; v1.scrollLeft = v2.scrollLeft; };
    };

    function renderExcel(v1, v2, diffItems) {
        const rows = Math.max(dataA.val.length, dataB.val.length);
        const cols = Math.max(dataA.val[0]?.length || 0, dataB.val[0]?.length || 0);
        const build = (curr, other, isMain) => {
            let h = '<table class="excel-table"><thead><tr><th>#</th>';
            for(let j=0; j<cols; j++) h += `<th>${String.fromCharCode(65+j)}</th>`;
            h += '</tr></thead><tbody>';
            for(let i=0; i<rows; i++) {
                h += `<tr><th>${i+1}</th>`;
                for(let j=0; j<cols; j++) {
                    const val = curr[i]?.[j] || "", comp = other[i]?.[j] || "";
                    const isDiff = String(val).trim() !== String(comp).trim();
                    const id = `cell_${isMain?'A':'B'}_${i}_${j}`;
                    if(isDiff && isMain) diffItems.push({id: id, txt: `行${i+1}列${String.fromCharCode(65+j)}: "${val}" vs "${comp}"`});
                    h += `<td id="${id}" class="${isDiff?'diff-cell':''}">${val}</td>`;
                }
                h += '</tr>';
            }
            return h + '</tbody></table>';
        };
        v1.innerHTML = build(dataA.val, dataB.val, true);
        v2.innerHTML = build(dataB.val, dataA.val, false);
    }

    function renderText(v1, v2, diffItems) {
        const diffs = Diff.diffLines(String(dataA.val), String(dataB.val));
        v1.innerHTML = '<div class="text-mode" id="txt1"></div>'; v2.innerHTML = '<div class="text-mode" id="txt2"></div>';
        const d1 = v1.firstChild, d2 = v2.firstChild;
        const formatPage = (t) => t.replace(/\[\[PAGE_(\d+)\]\]/g, '<div class="page-divider"><span class="page-badge">第 $1 页</span></div>');

        diffs.forEach((p, idx) => {
            const id = `diff_txt_${idx}`;
            if (p.added) {
                diffItems.push({id: id, txt: `新增内容: ${p.value.substring(0,20)}...`});
                d2.innerHTML += `<span id="${id}" class="txt-added">${formatPage(p.value)}</span>`;
                d1.innerHTML += `<span style="color:transparent;user-select:none">${p.value}</span>`;
            } else if (p.removed) {
                diffItems.push({id: id, txt: `删除内容: ${p.value.substring(0,20)}...`});
                d1.innerHTML += `<span id="${id}" class="txt-removed">${formatPage(p.value)}</span>`;
                d2.innerHTML += `<span style="color:transparent;user-select:none">${p.value}</span>`;
            } else {
                const f = formatPage(p.value); d1.innerHTML += f; d2.innerHTML += f;
            }
        });
    }
</script>
</body>
</html>
