<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>文字智能核对助手</title>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsdiff/5.1.0/diff.min.js"></script>

    <style>
        :root { 
            --primary: #1a73e8; /* 核心蓝色 */
            --primary-light: #e8f0fe;
            --bg: #f8f9fa; 
            --diff-add: #e6ffec; 
            --diff-remove: #ffebe9; 
        }
        body { font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #3c4043; }
        
        .header { text-align: center; margin-bottom: 20px; }
        .header h1 { font-size: 28px; color: var(--primary); margin: 0; font-weight: 600; }
        .header p { font-size: 13px; color: #70757a; margin-top: 5px; }

        .container { max-width: 1400px; margin: 0 auto; }

        /* 上传区域：保持极致紧凑 */
        .upload-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        .drop-card { 
            background: #fff; border: 2px dashed #dadce0; border-radius: 8px; 
            height: 65px; display: flex; flex-direction: column; justify-content: center; align-items: center;
            cursor: pointer; transition: all 0.2s;
        }
        .drop-card:hover, .drop-card.drag-over { border-color: var(--primary); background: var(--primary-light); border-style: solid; }
        .drop-card h3 { font-size: 14px; margin: 0; color: #5f6368; pointer-events: none; }
        .file-info { font-size: 12px; color: var(--primary); font-weight: bold; margin-top: 3px; pointer-events: none; }

        .btn-run { 
            width: 100%; height: 48px; background: var(--primary); color: white; border: none; 
            border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-bottom: 20px;
            box-shadow: 0 1px 2px rgba(60,64,67,0.3); transition: 0.2s;
        }
        .btn-run:hover { background: #1557b0; box-shadow: 0 4px 8px rgba(60,64,67,0.2); }

        /* 对比面板：高度拉长 */
        .main-view { background: #fff; border-radius: 12px; box-shadow: 0 1px 3px rgba(60,64,67,0.12); display: grid; grid-template-columns: 1fr 1fr; border: 1px solid #dadce0; overflow: hidden; }
        .label-bar { padding: 10px 20px; background: #f1f3f4; font-size: 13px; font-weight: bold; border-bottom: 1px solid #dadce0; color: #5f6368; display: flex; justify-content: space-between; }
        
        /* 预览框高度从 500px 拉长到 750px */
        .viewer { 
            height: 750px; overflow-y: auto; padding: 25px; 
            font-size: 14px; line-height: 2.2; white-space: pre-wrap; word-break: break-all; 
            background-color: #fff;
        }
        .viewer:first-of-type { border-right: 1px solid #dadce0; }

        /* 差异样式 */
        .added { background: var(--diff-add); color: #137333; border-bottom: 1px solid #34a853; }
        .removed { background: var(--diff-remove); color: #d93025; text-decoration: line-through; }
        .page-tag { display: block; background: var(--primary-light); color: var(--primary); padding: 4px 12px; border-left: 4px solid var(--primary); font-weight: bold; margin: 15px 0 10px 0; font-size: 12px; }
        
        /* 滚动条美化 */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #dadce0; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #bdc1c6; }
    </style>
</head>
<body>

<div class="header">
    <h1>文字智能核对助手</h1>
    <p>本地安全比对，支持 PDF、Word、Excel 格式</p>
</div>

<div class="container">
    <div class="upload-row">
        <div class="drop-card" id="cardA">
            <input type="file" id="fileA" hidden accept=".pdf,.docx,.xlsx,.xls">
            <h3>📁 点击或拖入原件 (BASE)</h3>
            <div id="txtA" class="file-info">等待上传...</div>
        </div>
        <div class="drop-card" id="cardB">
            <input type="file" id="fileB" hidden accept=".pdf,.docx,.xlsx,.xls">
            <h3>📁 点击或拖入新版 (COMPARE)</h3>
            <div id="txtB" class="file-info">等待上传...</div>
        </div>
    </div>

    <button class="btn-run" id="btnRun">开始智能核对分析</button>

    <div class="main-view">
        <div class="label-bar"><span>原件内容预览</span></div>
        <div class="label-bar"><span>对比修订结果</span></div>
        <div id="v1" class="viewer"></div>
        <div id="v2" class="viewer"></div>
    </div>
</div>

<script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
    let fileData = { A: "", B: "" };

    // 交互初始化
    function initCard(cardId, inputId, key) {
        const card = document.getElementById(cardId);
        const input = document.getElementById(inputId);

        card.onclick = () => input.click();

        // 强力拦截拖拽
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eName => {
            card.addEventListener(eName, (e) => { e.preventDefault(); e.stopPropagation(); }, false);
        });

        card.addEventListener('dragover', () => card.classList.add('drag-over'));
        card.addEventListener('dragleave', () => card.classList.remove('drag-over'));
        card.addEventListener('drop', (e) => {
            card.classList.remove('drag-over');
            const file = e.dataTransfer.files[0];
            if (file) handleFile(file, key);
        });

        input.onchange = (e) => handleFile(e.target.files[0], key);
    }

    initCard('cardA', 'fileA', 'A');
    initCard('cardB', 'fileB', 'B');

    // 文件解析逻辑（修复 Excel 乱码）
    async function handleFile(file, key) {
        if (!file) return;
        document.getElementById('txt' + key).innerText = "已加载：" + file.name;
        const ext = file.name.split('.').pop().toLowerCase();
        let content = "";

        try {
            if (ext === 'xlsx' || ext === 'xls') {
                const ab = await file.arrayBuffer();
                const wb = XLSX.read(new Uint8Array(ab), { type: 'array' });
                wb.SheetNames.forEach(name => {
                    content += `[表格: ${name}]\n` + XLSX.utils.sheet_to_txt(wb.Sheets[name]) + "\n";
                });
            } else if (ext === 'pdf') {
                const pdf = await pdfjsLib.getDocument(await file.arrayBuffer()).promise;
                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const textObj = await page.getTextContent();
                    content += `[第 ${i} 页]\n` + textObj.items.map(s => s.str).join(" ") + "\n";
                }
            } else if (ext === 'docx') {
                const res = await mammoth.extractRawText({ arrayBuffer: await file.arrayBuffer() });
                content = res.value;
            }
            fileData[key] = content;
        } catch (err) {
            alert("文件解析出错，请确认文件是否损坏或加密。");
        }
    }

    // 执行 Diff 对比
    document.getElementById('btnRun').onclick = () => {
        if (!fileData.A || !fileData.B) return alert("请先上传两份需要核对的文件");
        
        const v1 = document.getElementById('v1');
        const v2 = document.getElementById('v2');
        v1.innerHTML = '正在深度扫描差异...'; v2.innerHTML = '正在生成修订报告...';

        setTimeout(() => {
            const diffs = Diff.diffLines(fileData.A, fileData.B);
            v1.innerHTML = ''; v2.innerHTML = '';

            diffs.forEach(part => {
                const processedText = part.value.replace(/\[(第 \d+ 页|表格: .*?)\]/g, '<span class="page-tag">$1</span>');
                const lineBreakCount = (part.value.match(/\n/g) || []).length;

                if (part.added) {
                    v2.appendChild(createSpan(processedText, 'added'));
                    v1.appendChild(createSpan('\n'.repeat(lineBreakCount + 1), ''));
                } else if (part.removed) {
                    v1.appendChild(createSpan(processedText, 'removed'));
                    v2.appendChild(createSpan('\n'.repeat(lineBreakCount + 1), ''));
                } else {
                    v1.appendChild(createSpan(processedText, ''));
                    v2.appendChild(createSpan(processedText, ''));
                }
            });

            // 同步滚动
            v1.onscroll = () => v2.scrollTop = v1.scrollTop;
            v2.onscroll = () => v1.scrollTop = v2.scrollTop;
        }, 100);
    };

    function createSpan(html, className) {
        const el = document.createElement('span');
        if (className) el.className = className;
        el.innerHTML = html;
        return el;
    }
</script>
</body>
</html>
